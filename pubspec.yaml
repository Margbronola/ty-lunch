name: tylunch
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_launcher_icons: ^0.14.4
  firebase_core: ^4.0.0
  shared_preferences: ^2.5.3
  http: ^1.4.0
  intl: ^0.20.2
  path_provider: ^2.1.5
  sqflite: ^2.4.2
  page_transition: ^2.2.1
  month_year_picker: ^0.4.0+1
  flutter_localizations:
    sdk: flutter
  firebase_messaging: ^16.0.0
  rxdart: ^0.28.0
  fluttertoast: ^8.2.12
  firebase_auth: ^6.0.0
  flutter_svg: ^2.2.0
  webview_flutter: ^4.13.0
  lecle_downloads_path_provider: ^0.0.2+8
  printing: ^5.14.2
  html: ^0.15.6
  url_launcher: ^6.3.2
  flutter_verification_code: ^1.1.7
  intl_phone_field: ^3.2.0
  mask_text_input_formatter: ^2.9.0
  dotted_border: ^3.1.0
  shimmer: ^3.0.0


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/appLogo.png"


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

dependency_overrides:
  intl: 0.19.0

  
flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: CraftRounded
      fonts:
        - asset: assets/fonts/CraftRounded-Bold.ttf
          weight: 800
        - asset: assets/fonts/CraftRounded-Regular.ttf
          weight: 400
        - asset: assets/fonts/CraftRounded-DemiBold.ttf
          weight: 600

    - family: Ebrima
      fonts:
        - asset: assets/fonts/ebrima-bold.ttf
          weight: 600
        - asset: assets/fonts/ebrima.ttf

    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Black.ttf
          weight: 900
        - asset: assets/fonts/Poppins-BlackItalic.ttf
          weight: 900
          style: italic
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-BoldItalic.ttf
          weight: 700
          style: italic
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Poppins-ExtraBoldItalic.ttf
          weight: 800
          style: italic
        - asset: assets/fonts/Poppins-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Poppins-ExtraLightItalic.ttf
          weight: 200
          style: italic
        - asset: assets/fonts/Poppins-Italic.ttf
          style: italic
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-LightItalic.ttf 
          weight: 300
          style: italic
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/Poppins-Thin.ttf
          weight: 100
        - asset: assets/fonts/Poppins-ThinItalic.ttf
          weight: 100
          style: italic
